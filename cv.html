<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV — Katy Saintin</title>
  <style>
    /* ── CV — styles spécifiques ── */

    /* HERO CV — impact immédiat */
    .cv-hero {
      background: linear-gradient(135deg, var(--navy) 0%, #3d4f8f 100%);
      color: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      margin-bottom: 1.5rem;
    }
    .cv-hero h1 {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 800;
      margin-bottom: .3rem;
    }
    .cv-hero .title {
      color: var(--terracotta);
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    .cv-hero .tagline {
      color: rgba(255,255,255,.85);
      font-size: .95rem;
      line-height: 1.7;
      max-width: 680px;
    }
    .cv-hero .summary {
      color: rgba(255,255,255,.7);
      font-size: .88rem;
      line-height: 1.7;
      max-width: 680px;
      margin-top: .6rem;
    }

    /* HIGHLIGHTS */
    .highlights {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .highlight {
      background: white;
      border-radius: 16px;
      padding: 1.4rem 1rem;
      text-align: center;
      border-top: 4px solid var(--terracotta);
    }
    .highlight-value { font-size: 2rem; font-weight: 800; color: var(--navy); }
    .highlight-label { color: #666; font-size: .8rem; margin-top: .3rem; line-height: 1.3; }

    /* CARD générique */
    .cv-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .cv-card h3 {
      color: var(--navy);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      padding-bottom: .6rem;
      border-bottom: 2px solid var(--terracotta);
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* GRILLE 2 cols */
    .cv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .cv-full { grid-column: 1 / -1; }
    @media (max-width: 680px) {
      .cv-grid { grid-template-columns: 1fr; }
      .cv-full { grid-column: 1; }
    }

    /* EXPERTISE — visuel impactant */
    .expertise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 1rem;
    }
    .expertise-block {
      background: #f8f9ff;
      border-radius: 12px;
      padding: 1rem;
      border-left: 4px solid var(--navy);
    }
    .expertise-block h4 {
      color: var(--navy);
      font-size: .85rem;
      font-weight: 700;
      margin-bottom: .7rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tags { display: flex; flex-wrap: wrap; gap: .35rem; }
    .tag {
      background: white;
      color: var(--navy);
      border: 1px solid #dde;
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 500;
    }

    /* TIMELINE expérience */
    .timeline { list-style: none; }
    .timeline li {
      position: relative;
      padding: 0 0 1.8rem 1.4rem;
      border-left: 2px solid #e0e4f0;
    }
    .timeline li:last-child { padding-bottom: 0; border-left-color: transparent; }
    .timeline li::before {
      content: '';
      position: absolute; left: -5px; top: 7px;
      width: 8px; height: 8px;
      background: var(--terracotta); border-radius: 50%;
    }
    .tl-period {
      font-size: .75rem; color: var(--terracotta);
      font-weight: 700; margin-bottom: .1rem;
    }
    .tl-org { font-weight: 800; color: var(--navy); font-size: 1rem; }
    .tl-pos { color: #666; font-size: .85rem; margin-bottom: .5rem; font-style: italic; }
    .tl-details { list-style: none !important; padding-left: 0 !important; }
    .tl-details li {
      list-style: none !important;
      font-size: .82rem; color: #555;
      margin-bottom: .3rem; padding-left: 1.1rem; position: relative;
    }
    .tl-details li::marker { display: none; content: ''; }
    .tl-details li::before {
      content: '→'; position: absolute; left: 0;
      color: var(--terracotta); font-weight: 700;
    }

    /* PROJETS — cards visuelles */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }
    .project-card {
      background: #f8f9ff;
      border-radius: 12px;
      padding: 1.1rem;
      border-top: 3px solid var(--navy);
    }
    .project-name {
      font-weight: 800; color: var(--navy); font-size: .95rem; margin-bottom: .2rem;
    }
    .project-name a { color: var(--navy); text-decoration: none; }
    .project-name a:hover { text-decoration: underline; }
    .project-role {
      display: inline-block;
      background: var(--terracotta); color: white;
      font-size: .72rem; font-weight: 700;
      padding: .15rem .55rem; border-radius: 999px; margin-bottom: .5rem;
    }
    .project-desc { font-size: .82rem; color: #666; line-height: 1.5; }

    /* PUBLICATIONS */
    .pub-list { display: flex; flex-direction: column; gap: .7rem; }
    .pub-item {
      display: flex; gap: 1rem; align-items: flex-start;
      padding: .6rem 0; border-bottom: 1px solid #f0f0f0;
    }
    .pub-item:last-child { border-bottom: none; }
    .pub-year {
      min-width: 2.8rem; text-align: right;
      font-size: .8rem; color: var(--terracotta); font-weight: 700; padding-top: .1rem;
    }
    .pub-body {}
    .pub-title { font-size: .88rem; color: var(--navy); font-weight: 600; line-height: 1.4; }
    .pub-title a { color: var(--navy); text-decoration: none; }
    .pub-title a:hover { text-decoration: underline; }
    .pub-event { font-size: .78rem; color: #999; margin-top: .1rem; }

    /* FORMATION */
    .edu-list { display: flex; flex-direction: column; gap: 1rem; }
    .edu-item { border-left: 3px solid var(--terracotta); padding-left: .9rem; }
    .edu-year { font-size: .75rem; color: var(--terracotta); font-weight: 700; }
    .edu-degree { font-weight: 700; color: var(--navy); font-size: .9rem; }
    .edu-institution { font-size: .85rem; color: #555; }
    .edu-details { font-size: .78rem; color: #999; }

    /* RECONNAISSANCE — mise en avant forte */
    .recognition-list { display: flex; flex-direction: column; gap: .7rem; }
    .recognition-item {
      display: flex; align-items: center; gap: .8rem;
      background: linear-gradient(135deg, var(--navy), #4a5fa0);
      color: white; border-radius: 12px; padding: .9rem 1.2rem;
      font-weight: 700; font-size: .95rem;
    }

    /* CERTIFICATIONS */
    .cert-list { display: flex; flex-direction: column; gap: .7rem; }
    .cert-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: .5rem 0; border-bottom: 1px solid #f0f0f0;
    }
    .cert-item:last-child { border-bottom: none; }
    .cert-name { font-size: .85rem; color: var(--text); }
    .cert-year { font-size: .8rem; color: var(--terracotta); font-weight: 700; white-space: nowrap; margin-left: .5rem; }
    .cert-planned {
      font-size: .7rem; background: #fff3e0; color: #e65100;
      padding: .1rem .45rem; border-radius: 999px; margin-left: .4rem;
    }

    /* COMMUNITIES */
    .communities { display: flex; flex-wrap: wrap; gap: .5rem; }
    .community-tag {
      background: var(--navy); color: white;
      padding: .3rem .8rem; border-radius: 999px; font-size: .82rem; font-weight: 600;
    }

    /* ENSEIGNEMENT */
    .teaching-list { list-style: none; }
    .teaching-list li {
      padding: .4rem 0; border-bottom: 1px solid #f5f5f5;
      font-size: .88rem; color: #555;
    }
    .teaching-list li:last-child { border-bottom: none; }
    .teaching-list li::before { content: '→ '; color: var(--terracotta); font-weight: 700; }

    /* PROFILS */
    .profiles-list { display: flex; flex-wrap: wrap; gap: .6rem; }
    .profile-link {
      background: #f0f2fa; color: var(--navy);
      padding: .45rem 1rem; border-radius: 8px;
      text-decoration: none; font-size: .85rem; font-weight: 600;
      transition: background .15s;
    }
    .profile-link:hover { background: var(--navy); color: white; }
  </style>
</head>
<body>

<div class="container">

  <!-- HERO -->
  <div class="cv-hero">
    <h1 id="cv-name"></h1>
    <div class="title" id="cv-title"></div>
    <div class="tagline" id="cv-tagline"></div>
    <div class="summary" id="cv-summary"></div>
  </div>

  <!-- HIGHLIGHTS -->
  <div class="highlights" id="cv-highlights"></div>

  <div class="cv-grid">

    <!-- EXPERTISE — pleine largeur -->
    <div class="cv-card cv-full">
      <h3>⚙️ <span id="label-expertise"></span></h3>
      <div class="expertise-grid" id="cv-expertise"></div>
    </div>

    <!-- EXPÉRIENCE — pleine largeur -->
    <div class="cv-card cv-full">
      <h3>💼 <span id="label-experience"></span></h3>
      <ul class="timeline" id="cv-experience"></ul>
    </div>

    <!-- PROJETS — pleine largeur -->
    <div class="cv-card cv-full">
      <h3>🚀 <span id="label-projects"></span></h3>
      <div class="projects-grid" id="cv-projects"></div>
    </div>

    <!-- PUBLICATIONS — pleine largeur -->
    <div class="cv-card cv-full">
      <h3>📚 <span id="label-publications"></span></h3>
      <div class="pub-list" id="cv-publications"></div>
    </div>

    <!-- FORMATION -->
    <div class="cv-card">
      <h3>🎓 <span id="label-education"></span></h3>
      <div class="edu-list" id="cv-education"></div>
    </div>

    <!-- RECONNAISSANCE + CERTIFICATIONS -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">
      <div class="cv-card" style="margin-bottom:0">
        <h3>🏅 <span id="label-recognition"></span></h3>
        <div class="recognition-list" id="cv-recognition"></div>
      </div>
      <div class="cv-card" style="margin-bottom:0">
        <h3>📋 <span id="label-certifications"></span></h3>
        <div class="cert-list" id="cv-certifications"></div>
      </div>
    </div>

    <!-- ENSEIGNEMENT -->
    <div class="cv-card">
      <h3>🧑‍🏫 <span id="label-teaching"></span></h3>
      <ul class="teaching-list" id="cv-teaching"></ul>
    </div>

    <!-- COMMUNAUTÉS + PROFILS -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">
      <div class="cv-card" style="margin-bottom:0">
        <h3>🌐 <span id="label-communities"></span></h3>
        <div class="communities" id="cv-communities"></div>
      </div>
      <div class="cv-card" style="margin-bottom:0">
        <h3>🔗 <span id="label-profiles"></span></h3>
        <div class="profiles-list" id="cv-profiles"></div>
      </div>
    </div>

  </div>

  <footer id="footer"></footer>
</div>

<script src="js/site.js"></script>
<script>
  // Charge cv.json et attend siteReady — robuste à l'ordre d'arrivée
  let cvData = null;
  let siteLang = null;

  fetch('data/cv.json')
    .then(r => r.json())
    .then(data => {
      cvData = data;
      if (siteLang !== null) renderCV(cvData, siteLang);
    })
    .catch(err => console.error('Erreur cv.json :', err));

  document.addEventListener('siteReady', ({ detail: { lang } }) => {
    siteLang = lang;
    if (cvData !== null) renderCV(cvData, siteLang);
  });

  function renderCV(cv, lang) {
    const fr = lang === 'fr';

    const labels = {
      expertise:      fr ? 'Expertise Technique' : 'Technical Expertise',
      experience:     fr ? 'Parcours Professionnel' : 'Professional Experience',
      projects:       fr ? 'Projets Majeurs' : 'Major Projects',
      publications:   fr ? 'Publications & Conférences' : 'Publications & Conferences',
      education:      fr ? 'Formation' : 'Education',
      recognition:    fr ? 'Reconnaissance' : 'Recognition',
      certifications: 'Certifications',
      teaching:       fr ? 'Enseignement & Transmission' : 'Teaching & Knowledge Transfer',
      communities:    fr ? 'Communautés' : 'Communities',
      profiles:       fr ? 'Profils' : 'Online Profiles',
    };
    Object.entries(labels).forEach(([k, v]) => {
      const el = document.getElementById('label-' + k);
      if (el) el.textContent = v;
    });

    const p = cv.profile;
    document.getElementById('cv-name').textContent    = p.name;
    document.getElementById('cv-title').textContent   = fr ? p.titleFr : p.titleEn;
    document.getElementById('cv-tagline').textContent = fr ? p.taglineFr : p.taglineEn;
    document.getElementById('cv-summary').textContent = fr ? p.summaryFr : p.summaryEn;

    document.getElementById('cv-highlights').innerHTML = cv.highlights.map(h =>
      `<div class="highlight">
        <div class="highlight-value">${h.value}</div>
        <div class="highlight-label">${fr ? h.labelFr : h.labelEn}</div>
      </div>`).join('');

    document.getElementById('cv-expertise').innerHTML = cv.expertise.map(e =>
      `<div class="expertise-block">
        <h4>${e.title}</h4>
        <div class="tags">${e.items.map(i => `<span class="tag">${i}</span>`).join('')}</div>
      </div>`).join('');

    document.getElementById('cv-experience').innerHTML = cv.experience.map(e =>
      `<li>
        <div class="tl-period">${e.period}</div>
        <div class="tl-org">${e.organization}</div>
        <div class="tl-pos">${e.position}</div>
        <ul class="tl-details">${e.details.map(d => `<li>${d}</li>`).join('')}</ul>
      </li>`).join('');

    document.getElementById('cv-projects').innerHTML = cv.majorProjects.map(proj =>
      `<div class="project-card">
        <div class="project-name">${proj.url
          ? `<a href="${proj.url}" target="_blank">${proj.name}</a>`
          : proj.name}</div>
        <span class="project-role">${proj.role}</span>
        <div class="project-desc">${proj.description}</div>
      </div>`).join('');

    const allPubs = [
      ...cv.publications.map(pub => ({ ...pub, type: 'paper' })),
      ...cv.talks.map(t => ({ ...t, type: 'talk' }))
    ].sort((a, b) => b.year - a.year);

    document.getElementById('cv-publications').innerHTML = allPubs.map(pub =>
      `<div class="pub-item">
        <div class="pub-year">${pub.year} ${pub.type === 'talk' ? '🎤' : '📄'}</div>
        <div class="pub-body">
          <div class="pub-title">${pub.url
            ? `<a href="${pub.url}" target="_blank">${pub.title}</a>`
            : pub.title}</div>
          <div class="pub-event">${pub.event}${pub.paperId ? ' · ' + pub.paperId : ''}</div>
        </div>
      </div>`).join('');

    document.getElementById('cv-education').innerHTML = cv.education.map(e =>
      `<div class="edu-item">
        <div class="edu-year">${e.year}</div>
        <div class="edu-degree">${fr ? e.degreeFr : e.degreeEn}</div>
        <div class="edu-institution">${e.institution}</div>
        <div class="edu-details">${fr ? e.detailsFr : e.detailsEn}</div>
      </div>`).join('');

    document.getElementById('cv-recognition').innerHTML = cv.recognition
      .map(r => `<div class="recognition-item">🏅 ${r.title}</div>`).join('');

    document.getElementById('cv-certifications').innerHTML = cv.certifications.map(c =>
      `<div class="cert-item">
        <span class="cert-name">${c.name}${c.status === 'planned'
          ? `<span class="cert-planned">${fr ? 'prévu' : 'planned'}</span>` : ''}</span>
        <span class="cert-year">${c.year}</span>
      </div>`).join('');

    document.getElementById('cv-teaching').innerHTML = cv.teaching.items
      .map(i => `<li>${i}</li>`).join('');

    document.getElementById('cv-communities').innerHTML = cv.communities
      .map(c => `<span class="community-tag">${c}</span>`).join('');

    document.getElementById('cv-profiles').innerHTML = cv.profiles
      .filter(prof => prof.url)
      .map(prof => `<a class="profile-link" href="${prof.url}" target="_blank">${prof.name}</a>`)
      .join('');
  }
</script>
</body>
</html>
