<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV — Katy Saintin</title>
  <style>
    /* ── Styles spécifiques cv.html ── */

    .cv-header {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .cv-header h1 { font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 800; margin-bottom: .4rem; }
    .cv-header .title { color: var(--navy); font-weight: 700; font-size: 1.1rem; margin-bottom: .6rem; }
    .cv-header .tagline { color: #666; font-size: .95rem; max-width: 700px; margin: 0 auto .8rem; line-height: 1.6; }
    .cv-header .summary { color: #555; font-size: .9rem; max-width: 750px; margin: 0 auto; line-height: 1.7; }

    /* HIGHLIGHTS */
    .highlights {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .highlight {
      background: white; border-radius: 16px; padding: 1.4rem;
      text-align: center;
    }
    .highlight-value { font-size: 2rem; font-weight: 800; color: var(--navy); }
    .highlight-label { color: #666; font-size: .85rem; margin-top: .3rem; line-height: 1.3; }

    /* GRILLE 2 COLONNES */
    .cv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 700px) { .cv-grid { grid-template-columns: 1fr; } }

    .cv-full { grid-column: 1 / -1; }

    /* CARD */
    .cv-card {
      background: white; border-radius: 16px; padding: 1.5rem;
    }
    .cv-card h3 {
      color: var(--navy); font-size: 1rem; font-weight: 700;
      margin-bottom: 1rem; padding-bottom: .5rem;
      border-bottom: 2px solid var(--terracotta);
      display: flex; align-items: center; gap: .5rem;
    }

    /* TIMELINE */
    .timeline { list-style: none; }
    .timeline li {
      position: relative;
      padding: 0 0 1.4rem 1.2rem;
      border-left: 2px solid #e8e8e8;
    }
    .timeline li:last-child { padding-bottom: 0; border-left-color: transparent; }
    .timeline li::before {
      content: '';
      position: absolute; left: -5px; top: 6px;
      width: 8px; height: 8px;
      background: var(--terracotta); border-radius: 50%;
    }
    .tl-period { font-size: .8rem; color: var(--terracotta); font-weight: 700; margin-bottom: .15rem; }
    .tl-org { font-weight: 700; color: var(--navy); font-size: .95rem; }
    .tl-pos { color: #555; font-size: .85rem; margin-bottom: .4rem; }
    .tl-details { list-style: disc; padding-left: 1rem; }
    .tl-details li { font-size: .82rem; color: #666; margin-bottom: .15rem; }

    /* EXPERTISE GRID */
    .expertise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .expertise-block h4 { color: var(--navy); font-size: .9rem; margin-bottom: .6rem; }
    .tags { display: flex; flex-wrap: wrap; gap: .4rem; }
    .tag {
      background: #f0f2fa; color: var(--navy);
      padding: .25rem .65rem; border-radius: 999px; font-size: .8rem; font-weight: 500;
    }

    /* PROJETS */
    .projects-list { display: flex; flex-direction: column; gap: .9rem; }
    .project-item { border-left: 3px solid var(--terracotta); padding-left: .9rem; }
    .project-name { font-weight: 700; color: var(--navy); font-size: .95rem; }
    .project-name a { color: var(--navy); text-decoration: none; }
    .project-name a:hover { text-decoration: underline; }
    .project-role { font-size: .8rem; color: var(--terracotta); font-weight: 600; }
    .project-desc { font-size: .82rem; color: #666; margin-top: .2rem; line-height: 1.5; }

    /* PUBLICATIONS */
    .pub-list { display: flex; flex-direction: column; gap: .8rem; }
    .pub-item { border-left: 3px solid #e0e0e0; padding-left: .9rem; }
    .pub-year { font-size: .75rem; color: var(--terracotta); font-weight: 700; }
    .pub-title { font-size: .88rem; color: var(--navy); font-weight: 600; line-height: 1.4; }
    .pub-title a { color: var(--navy); text-decoration: none; }
    .pub-title a:hover { text-decoration: underline; }
    .pub-event { font-size: .78rem; color: #888; }

    /* EDUCATION */
    .edu-list { display: flex; flex-direction: column; gap: 1rem; }
    .edu-item {}
    .edu-year { font-size: .78rem; color: var(--terracotta); font-weight: 700; }
    .edu-degree { font-weight: 700; color: var(--navy); font-size: .9rem; }
    .edu-institution { font-size: .85rem; color: #555; }
    .edu-details { font-size: .8rem; color: #888; }

    /* RECOGNITION */
    .recognition-list { display: flex; flex-direction: column; gap: .6rem; }
    .recognition-item {
      background: linear-gradient(135deg, var(--navy), #4a5fa0);
      color: white; border-radius: 10px; padding: .7rem 1rem;
      font-weight: 600; font-size: .9rem; text-align: center;
    }

    /* CERTIFICATIONS */
    .cert-list { display: flex; flex-direction: column; gap: .6rem; }
    .cert-item { display: flex; justify-content: space-between; align-items: center; }
    .cert-name { font-size: .85rem; color: var(--text); }
    .cert-year { font-size: .78rem; color: var(--terracotta); font-weight: 700; }
    .cert-status-planned {
      font-size: .72rem; background: #fff3e0; color: #e65100;
      padding: .15rem .5rem; border-radius: 999px; margin-left: .5rem;
    }

    /* COMMUNITIES */
    .communities { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem; }
    .community-tag {
      background: var(--navy); color: white;
      padding: .3rem .8rem; border-radius: 999px; font-size: .82rem; font-weight: 600;
    }

    /* TEACHING */
    .teaching-list { list-style: none; }
    .teaching-list li {
      padding: .4rem 0; border-bottom: 1px solid #f0f0f0;
      font-size: .88rem; color: #555;
    }
    .teaching-list li:last-child { border-bottom: none; }
    .teaching-list li::before { content: '→ '; color: var(--terracotta); font-weight: 700; }

    /* PROFILES */
    .profiles-list { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: .3rem; }
    .profile-link {
      background: #f0f2fa; color: var(--navy);
      padding: .4rem .9rem; border-radius: 8px;
      text-decoration: none; font-size: .85rem; font-weight: 600;
    }
    .profile-link:hover { background: var(--navy); color: white; }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="cv-header" id="cv-header">
    <h1 id="cv-name"></h1>
    <div class="title" id="cv-title"></div>
    <div class="tagline" id="cv-tagline"></div>
    <div class="summary" id="cv-summary"></div>
  </div>

  <!-- HIGHLIGHTS -->
  <div class="highlights" id="cv-highlights"></div>

  <!-- GRILLE PRINCIPALE -->
  <div class="cv-grid">

    <!-- Expertise — pleine largeur -->
    <div class="cv-card cv-full">
      <h3>⚙️ <span id="label-expertise"></span></h3>
      <div class="expertise-grid" id="cv-expertise"></div>
    </div>

    <!-- Expérience — pleine largeur -->
    <div class="cv-card cv-full">
      <h3>💼 <span id="label-experience"></span></h3>
      <ul class="timeline" id="cv-experience"></ul>
    </div>

    <!-- Projets majeurs — pleine largeur -->
    <div class="cv-card cv-full">
      <h3>🚀 <span id="label-projects"></span></h3>
      <div class="projects-list" id="cv-projects"></div>
    </div>

    <!-- Publications -->
    <div class="cv-card cv-full">
      <h3>📚 <span id="label-publications"></span></h3>
      <div class="pub-list" id="cv-publications"></div>
    </div>

    <!-- Formation -->
    <div class="cv-card">
      <h3>🎓 <span id="label-education"></span></h3>
      <div class="edu-list" id="cv-education"></div>
    </div>

    <!-- Reconnaissance + Certifications -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">
      <div class="cv-card">
        <h3>🏅 <span id="label-recognition"></span></h3>
        <div class="recognition-list" id="cv-recognition"></div>
      </div>
      <div class="cv-card">
        <h3>📋 <span id="label-certifications"></span></h3>
        <div class="cert-list" id="cv-certifications"></div>
      </div>
    </div>

    <!-- Enseignement -->
    <div class="cv-card">
      <h3>🧑‍🏫 <span id="label-teaching"></span></h3>
      <ul class="teaching-list" id="cv-teaching"></ul>
    </div>

    <!-- Communautés + Profils -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">
      <div class="cv-card">
        <h3>🌐 <span id="label-communities"></span></h3>
        <div class="communities" id="cv-communities"></div>
      </div>
      <div class="cv-card">
        <h3>🔗 <span id="label-profiles"></span></h3>
        <div class="profiles-list" id="cv-profiles"></div>
      </div>
    </div>

  </div><!-- /cv-grid -->

  <footer id="footer"></footer>
</div>

<script src="js/site.js"></script>
<script>
  // Chargement du cv.json
  fetch('data/cv.json')
    .then(r => r.json())
    .then(cv => {
      // On attend que site.js ait fini (siteReady), puis on rend le CV
      document.addEventListener('siteReady', ({ detail: { lang } }) => renderCV(cv, lang));
      // Si siteReady déjà passé (edge case), on rend quand même
      if (window.__siteReady) renderCV(cv, localStorage.getItem('lang') || 'fr');

      // Re-render si langue change
      document.addEventListener('siteReady', ({ detail: { lang } }) => renderCV(cv, lang));
    })
    .catch(err => console.error('Erreur cv.json :', err));

  function renderCV(cv, lang) {
    const fr = lang === 'fr';

    // Labels bilingues
    const labels = {
      expertise:      fr ? 'Expertise Technique' : 'Technical Expertise',
      experience:     fr ? 'Parcours Professionnel' : 'Professional Experience',
      projects:       fr ? 'Projets Majeurs' : 'Major Projects',
      publications:   fr ? 'Publications & Conférences' : 'Publications & Conferences',
      education:      fr ? 'Formation' : 'Education',
      recognition:    fr ? 'Reconnaissance' : 'Recognition',
      certifications: fr ? 'Certifications' : 'Certifications',
      teaching:       fr ? 'Enseignement & Transmission' : 'Teaching & Knowledge Transfer',
      communities:    fr ? 'Communautés' : 'Communities',
      profiles:       fr ? 'Profils' : 'Online Profiles',
    };
    Object.entries(labels).forEach(([k,v]) => {
      const el = document.getElementById('label-' + k);
      if (el) el.textContent = v;
    });

    // HEADER
    const p = cv.profile;
    document.getElementById('cv-name').textContent    = p.name;
    document.getElementById('cv-title').textContent   = fr ? p.titleFr : p.titleEn;
    document.getElementById('cv-tagline').textContent = fr ? p.taglineFr : p.taglineEn;
    document.getElementById('cv-summary').textContent = fr ? p.summaryFr : p.summaryEn;

    // HIGHLIGHTS
    document.getElementById('cv-highlights').innerHTML = cv.highlights.map(h =>
      `<div class="highlight">
        <div class="highlight-value">${h.value}</div>
        <div class="highlight-label">${fr ? h.labelFr : h.labelEn}</div>
      </div>`).join('');

    // EXPERTISE
    document.getElementById('cv-expertise').innerHTML = cv.expertise.map(e =>
      `<div class="expertise-block">
        <h4>${e.title}</h4>
        <div class="tags">${e.items.map(i => `<span class="tag">${i}</span>`).join('')}</div>
      </div>`).join('');

    // EXPÉRIENCE
    document.getElementById('cv-experience').innerHTML = cv.experience.map(e =>
      `<li>
        <div class="tl-period">${e.period}</div>
        <div class="tl-org">${e.organization}</div>
        <div class="tl-pos">${e.position}</div>
        <ul class="tl-details">${e.details.map(d => `<li>${d}</li>`).join('')}</ul>
      </li>`).join('');

    // PROJETS
    document.getElementById('cv-projects').innerHTML = cv.majorProjects.map(p =>
      `<div class="project-item">
        <div class="project-name">${p.url ? `<a href="${p.url}" target="_blank">${p.name}</a>` : p.name}</div>
        <div class="project-role">${p.role}</div>
        <div class="project-desc">${p.description}</div>
      </div>`).join('');

    // PUBLICATIONS + TALKS
    const allPubs = [
      ...cv.publications.map(p => ({ ...p, type: 'paper' })),
      ...cv.talks.map(t => ({ ...t, type: 'talk' }))
    ].sort((a, b) => b.year - a.year);

    document.getElementById('cv-publications').innerHTML = allPubs.map(p =>
      `<div class="pub-item">
        <div class="pub-year">${p.year} ${p.type === 'talk' ? '🎤' : '📄'}</div>
        <div class="pub-title">${p.url ? `<a href="${p.url}" target="_blank">${p.title}</a>` : p.title}</div>
        <div class="pub-event">${p.event}${p.paperId ? ' · ' + p.paperId : ''}</div>
      </div>`).join('');

    // FORMATION
    document.getElementById('cv-education').innerHTML = cv.education.map(e =>
      `<div class="edu-item">
        <div class="edu-year">${e.year}</div>
        <div class="edu-degree">${fr ? e.degreeFr : e.degreeEn}</div>
        <div class="edu-institution">${e.institution}</div>
        <div class="edu-details">${fr ? e.detailsFr : e.detailsEn}</div>
      </div>`).join('');

    // RECONNAISSANCE
    document.getElementById('cv-recognition').innerHTML = cv.recognition
      .map(r => `<div class="recognition-item">🏅 ${r.title}</div>`).join('');

    // CERTIFICATIONS
    document.getElementById('cv-certifications').innerHTML = cv.certifications.map(c =>
      `<div class="cert-item">
        <span class="cert-name">${c.name}${c.status === 'planned'
          ? `<span class="cert-status-planned">${fr ? 'prévu' : 'planned'}</span>` : ''}</span>
        <span class="cert-year">${c.year}</span>
      </div>`).join('');

    // ENSEIGNEMENT
    document.getElementById('cv-teaching').innerHTML = cv.teaching.items
      .map(i => `<li>${i}</li>`).join('');

    // COMMUNAUTÉS
    document.getElementById('cv-communities').innerHTML = cv.communities
      .map(c => `<span class="community-tag">${c}</span>`).join('');

    // PROFILS
    document.getElementById('cv-profiles').innerHTML = cv.profiles
      .filter(p => p.url)
      .map(p => `<a class="profile-link" href="${p.url}" target="_blank">${p.name}</a>`)
      .join('');
  }
</script>
</body>
</html>
