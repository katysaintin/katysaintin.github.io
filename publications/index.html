<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Galerie</title>
<style>
  table { border-collapse: collapse; }
  td { padding: 8px; text-align: center; vertical-align: top; }
  img { width: 100px; height: 100px; object-fit: cover; border: 0; }
  .nom { font-size: 12px; word-break: break-all; max-width: 110px; }
</style>
</head>
<body>

<table id="galerie"></table>

<script>
// --- CONFIGURATION ---
// Si la page est sur https://USER.github.io/REPO/dossier/index.html
// ces valeurs sont détectées automatiquement.
// Sinon, vous pouvez les forcer manuellement ci-dessous.

let owner = location.hostname.split('.')[0];       // ex: "katysaintin"

// Cas "repo utilisateur" (le dépôt s'appelle USER.github.io) :
// tout le chemin après le domaine est un sous-dossier du dépôt.
let repo = location.hostname;                       // ex: "katysaintin.github.io"
let folder = location.pathname.split('/').filter(p => p.length).join('/'); // ex: "diplomes"

// (Si un jour vous utilisez un repo "projet" du type
//  https://USER.github.io/NOMDUREPO/dossier, remplacez par :
//  let pathParts = location.pathname.split('/').filter(p => p.length);
//  let repo = pathParts[0];
//  let folder = pathParts.slice(1).join('/');
// )

let branch = 'main';                                // changez en "master" si besoin

// Extensions considérées comme "images" pour la miniature
const extImg = ['jpg','jpeg','png','gif','webp','bmp','svg'];

// --- RÉCUPÉRATION DE LA LISTE ---
const url = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}?ref=${branch}`;

fetch(url)
  .then(r => {
    if (!r.ok) throw new Error('Erreur ' + r.status + ' - vérifiez owner/repo/branch');
    return r.json();
  })
  .then(files => {
    files.sort((a, b) => a.name.localeCompare(b.name));

    const table = document.getElementById('galerie');

    files.forEach(f => {
      if (f.name === 'index.html' || f.name === '.git') return;
      if (f.type !== 'file') return;

      const ext = f.name.split('.').pop().toLowerCase();
      const tr = document.createElement('tr');

      const tdImg = document.createElement('td');
      const a = document.createElement('a');
      a.href = f.name;
      a.target = '_blank';

      if (extImg.includes(ext)) {
        const img = document.createElement('img');
        img.src = f.name;
        a.appendChild(img);
      } else {
        a.textContent = '[fichier]';
      }
      tdImg.appendChild(a);

      const tdNom = document.createElement('td');
      tdNom.className = 'nom';
      tdNom.textContent = f.name;

      tr.appendChild(tdImg);
      tr.appendChild(tdNom);
      table.appendChild(tr);
    });
  })
  .catch(err => {
    document.getElementById('galerie').outerHTML =
      '<p style="color:red">Impossible de charger la liste : ' + err.message + '</p>';
  });
</script>

</body>
</html>
