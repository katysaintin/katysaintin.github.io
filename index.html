<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Katy Saintin</title>
<style>
:root {
  --navy: #2f3b73;
  --terracotta: #c96f4a;
  --background: #f8f7f4;
  --text: #202020;
}
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--background);
  color: var(--text);
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 2rem;
}

/* ── HEADER ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  position: relative;
}

/* ── NAV DESKTOP ── */
#menu { position: relative; }

.nav-links {
  display: flex;
  flex-wrap: wrap;
  gap: .8rem;
}

.nav-links a {
  text-decoration: none;
  color: var(--navy);
  font-weight: 600;
  font-size: .95rem;
  white-space: nowrap;
}

/* ── HAMBURGER ── */
#burger {
  display: none;
  border: none;
  background: var(--navy);
  color: white;
  font-size: 1.4rem;
  padding: .5rem .9rem;
  border-radius: 8px;
  cursor: pointer;
}

/* ── LANG BTN ── */
.lang-btn {
  border: none;
  background: var(--navy);
  color: white;
  padding: .6rem 1rem;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── MOBILE ── */
@media (max-width: 640px) {
  #burger { display: block; }

  .nav-links {
    display: none;
    flex-direction: column;
    position: absolute;
    top: calc(100% + .5rem);
    left: 0;
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 1rem;
    gap: 1rem;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    min-width: 200px;
  }

  .nav-links.open { display: flex; }

  .nav-links a { font-size: 1rem; }
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 4rem 0;
}
.hero h1 { font-size: 3rem; margin-bottom: .5rem; }
.hero h2 { color: var(--navy); margin-bottom: .5rem; }
.hero p { color: #666; }

.keywords {
  display: flex;
  justify-content: center;
  gap: .5rem;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.badge {
  background: var(--terracotta);
  color: white;
  padding: .4rem .8rem;
  border-radius: 999px;
  font-size: .9rem;
}

/* ── STATS ── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin: 3rem 0;
}
.stat {
  background: white;
  border-radius: 16px;
  padding: 1.5rem;
  text-align: center;
}
.stat-value {
  font-size: 2rem;
  font-weight: bold;
  color: var(--navy);
}

/* ── SECTIONS ── */
.section-title { color: var(--navy); margin-top: 4rem; }

.featured-card {
  background: white;
  border-left: 8px solid var(--terracotta);
  border-radius: 16px;
  padding: 2rem;
  margin: 2rem 0;
}
.featured-card a { color: var(--navy); font-weight: bold; text-decoration: none; }

.achievements { background: white; border-radius: 16px; padding: 2rem; }
.achievements li { margin-bottom: .8rem; }

.universes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}
.card { background: white; border-radius: 16px; padding: 1.5rem; }
.card a { color: var(--navy); text-decoration: none; font-weight: bold; }

footer { margin-top: 4rem; padding: 2rem 0; text-align: center; color: #666; }
</style>
</head>
<body>
<div class="container">

  <header>
    <nav id="menu"></nav>
    <button class="lang-btn" id="langBtn">FR / EN</button>
  </header>

  <section class="hero">
    <h1 id="hero-name"></h1>
    <h2 id="hero-title"></h2>
    <p id="hero-subtitle"></p>
    <div id="keywords" class="keywords"></div>
  </section>

  <section id="stats" class="stats"></section>

  <h2 class="section-title">📄 Curriculum Vitae</h2>
  <div id="featured"></div>

  <h2 class="section-title">🏆 Key Achievements</h2>
  <div id="achievements"></div>

  <h2 class="section-title">🌍 Univers</h2>
  <div id="universes" class="universes"></div>

  <footer id="footer"></footer>
</div>

<script src="js/site.js"></script>
</body>
</html>
